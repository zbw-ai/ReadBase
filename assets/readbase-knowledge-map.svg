<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ReadBase Knowledge Map</title>
  <desc id="desc">A clean research-style knowledge map for ReadBase, showing the path from model objects to parallel training, memory state, kernels, large-scale systems, and production debugging.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1280" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.58" stop-color="#F5F7FA"/>
      <stop offset="1" stop-color="#F7F4EF"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-18%" width="120%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#102033" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1.5 1.5L8.5 5L1.5 8.5" stroke="#7B8794" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .h1 { font: 760 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102033; }
      .h2 { font: 720 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102033; }
      .h3 { font: 720 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102033; }
      .label { font: 720 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; letter-spacing: .08em; }
      .body { font: 510 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .bodyStrong { font: 650 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 620 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .chip { font: 680 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .line { stroke: #8A98A8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #CBD5E1; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <rect width="1280" height="800" fill="url(#page)"/>
  <path d="M66 106H1214" class="thin"/>
  <path d="M66 676H1214" class="thin"/>

  <text x="66" y="58" class="h1">ReadBase</text>
  <text x="66" y="88" class="bodyStrong">AI Infra / LLM Infra 工程知识库</text>
  <text x="300" y="88" class="body">面向系统设计、生产排障、论文消化与面试复习的长期 handbook 集合</text>

  <g filter="url(#cardShadow)">
    <rect x="66" y="132" width="342" height="122" rx="10" fill="#FFFFFF" stroke="#D9E2EC"/>
    <rect x="66" y="132" width="342" height="7" rx="3.5" fill="#2A9D8F"/>
    <text x="92" y="171" class="label">CURRENT HANDBOOK</text>
    <text x="92" y="203" class="h2">AI Training Infrastructure</text>
    <text x="92" y="228" class="body">从 Transformer block 出发，理解训练系统为什么</text>
    <text x="92" y="247" class="body">围绕算子、状态、通信、存储和恢复展开。</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="452" y="132" width="762" height="136" rx="10" fill="#FFFFFF" stroke="#D8E0EA"/>
    <rect x="452" y="132" width="7" height="136" rx="3.5" fill="#3B6EA8"/>
    <text x="482" y="172" class="h2">第一轮阅读主线</text>
    <text x="482" y="201" class="body">先建立训练 infra 的骨架，再逐步补 FSDP、MoE、NCCL、FP8 等专题。</text>
    <g>
      <circle cx="506" cy="230" r="5" fill="#8FB9D9"/>
      <circle cx="640" cy="230" r="5" fill="#8FB9D9"/>
      <circle cx="792" cy="230" r="5" fill="#8FB9D9"/>
      <circle cx="948" cy="230" r="5" fill="#8FB9D9"/>
      <circle cx="1082" cy="230" r="5" fill="#8FB9D9"/>
      <path d="M512 230H634M646 230H786M798 230H942M954 230H1076" stroke="#8FB9D9" stroke-width="1.8"/>
      <text x="476" y="253" style="font: 650 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569;">Transformer</text>
      <text x="602" y="253" style="font: 650 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569;">Megatron-LM</text>
      <text x="743" y="253" style="font: 650 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569;">Tensor Parallelism</text>
      <text x="915" y="253" style="font: 650 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569;">Checkpointing</text>
      <text x="1053" y="253" style="font: 650 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569;">MegaScale</text>
    </g>
  </g>

  <path class="line" d="M408 193H452"/>

  <text x="66" y="316" class="label">KNOWLEDGE LAYERS</text>

  <g filter="url(#cardShadow)">
    <rect x="66" y="342" width="208" height="128" rx="10" fill="#FFFFFF" stroke="#D8E0EA"/>
    <rect x="66" y="342" width="5" height="128" rx="2.5" fill="#3B6EA8"/>
    <text x="92" y="382" class="h3">训练对象</text>
    <text x="92" y="411" class="bodyStrong">Transformer / Llama</text>
    <text x="92" y="433" class="body">先理解计算图和</text>
    <text x="92" y="453" class="body">主要算子形态。</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="310" y="342" width="208" height="128" rx="10" fill="#FFFFFF" stroke="#D8E0EA"/>
    <rect x="310" y="342" width="5" height="128" rx="2.5" fill="#2A9D8F"/>
    <text x="336" y="382" class="h3">并行训练</text>
    <text x="336" y="411" class="bodyStrong">TP / PP / DP / EP</text>
    <text x="336" y="433" class="body">核心是切分边界</text>
    <text x="336" y="453" class="body">和通信代价。</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="554" y="342" width="208" height="128" rx="10" fill="#FFFFFF" stroke="#D8E0EA"/>
    <rect x="554" y="342" width="5" height="128" rx="2.5" fill="#7A5195"/>
    <text x="580" y="382" class="h3">显存与状态</text>
    <text x="580" y="411" class="bodyStrong">ZeRO / FSDP / Ckpt</text>
    <text x="580" y="433" class="body">保存完整可恢复</text>
    <text x="580" y="453" class="body">训练状态。</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="798" y="342" width="208" height="128" rx="10" fill="#FFFFFF" stroke="#D8E0EA"/>
    <rect x="798" y="342" width="5" height="128" rx="2.5" fill="#D98C38"/>
    <text x="824" y="382" class="h3">Kernel 优化</text>
    <text x="824" y="411" class="bodyStrong">FlashAttention / FP8</text>
    <text x="824" y="433" class="body">减少数据移动，</text>
    <text x="824" y="453" class="body">贴近硬件上限。</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1042" y="342" width="172" height="128" rx="10" fill="#FFFFFF" stroke="#D8E0EA"/>
    <rect x="1042" y="342" width="5" height="128" rx="2.5" fill="#5B677A"/>
    <text x="1068" y="382" class="h3">规模系统</text>
    <text x="1068" y="411" class="bodyStrong">MegaScale / NCCL</text>
    <text x="1068" y="433" class="body">稳定跑完才是</text>
    <text x="1068" y="453" class="body">真正目标。</text>
  </g>

  <path class="line" d="M274 406H310"/>
  <path class="line" d="M518 406H554"/>
  <path class="line" d="M762 406H798"/>
  <path class="line" d="M1006 406H1042"/>

  <text x="66" y="528" class="label">ENGINEERING HANDBOOK CHAPTERS</text>

  <g filter="url(#cardShadow)">
    <rect x="66" y="554" width="258" height="98" rx="10" fill="#EEF8F6" stroke="#B7DDD8"/>
    <text x="92" y="590" class="h3">Tensor Parallelism</text>
    <text x="92" y="617" class="body">Column / Row Parallel</text>
    <text x="92" y="637" class="body">NVLink 域内优先</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="356" y="554" width="258" height="98" rx="10" fill="#F6F0FA" stroke="#DAC8E8"/>
    <text x="382" y="590" class="h3">Checkpointing</text>
    <text x="382" y="617" class="body">Sharded / Async / Elastic</text>
    <text x="382" y="637" class="body">可恢复训练状态</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="646" y="554" width="258" height="98" rx="10" fill="#F9F3EA" stroke="#E8D3B7"/>
    <text x="672" y="590" class="h3">FlashAttention</text>
    <text x="672" y="617" class="body">IO-aware Attention</text>
    <text x="672" y="637" class="body">长上下文训练基础</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="936" y="554" width="278" height="98" rx="10" fill="#F1F5F9" stroke="#CBD5E1"/>
    <text x="962" y="590" class="h3">NCCL / Fault Tolerance</text>
    <text x="962" y="617" class="body">Straggler · Step time</text>
    <text x="962" y="637" class="body">Storage · Network</text>
  </g>

  <g>
    <rect x="66" y="696" width="182" height="34" rx="9" fill="#FFFFFF" stroke="#D8E0EA"/>
    <text x="96" y="718" class="chip">Megatron-LM</text>
    <rect x="268" y="696" width="162" height="34" rx="9" fill="#FFFFFF" stroke="#D8E0EA"/>
    <text x="303" y="718" class="chip">ZeRO / FSDP</text>
    <rect x="450" y="696" width="152" height="34" rx="9" fill="#FFFFFF" stroke="#D8E0EA"/>
    <text x="486" y="718" class="chip">MoE Experts</text>
    <rect x="622" y="696" width="122" height="34" rx="9" fill="#FFFFFF" stroke="#D8E0EA"/>
    <text x="659" y="718" class="chip">NCCL</text>
    <rect x="764" y="696" width="144" height="34" rx="9" fill="#FFFFFF" stroke="#D8E0EA"/>
    <text x="798" y="718" class="chip">MegaScale</text>
  </g>

  <text x="66" y="766" class="bodyStrong">阅读建议：</text>
  <text x="140" y="766" class="body">Transformer → Megatron-LM → Tensor Parallelism → Checkpointing → MegaScale</text>
</svg>
